<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Smith — PSBT Transaction Builder</title>
  <!-- Bitcoin hammer favicon (inline SVG as base64 data URI) -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23161b22'/%3E%3Ctext x='32' y='46' font-size='38' text-anchor='middle' font-family='serif'%3E%E2%9A%92%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 12px;
      }

      h1 {
        font-size: 1.4rem;
      }

      h2 {
        font-size: 1rem;
      }

      .subtitle {
        font-size: 0.8rem;
      }
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 1.2rem;
      margin: 16px 0 8px;
      color: var(--accent);
    }

    h3 {
      font-size: 1rem;
      margin: 12px 0 6px;
      color: var(--text-muted);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stat-grid {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }

      .flow-diagram {
        gap: 8px;
        padding: 12px;
      }

      .flow-box {
        padding: 10px 12px;
        min-width: 90px;
      }
    }

    @media (max-width: 480px) {
      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .fixture-selector {
        flex-direction: column;
        align-items: stretch;
      }

      .fixture-selector select,
      .fixture-selector button {
        width: 100%;
      }
    }

    .fixture-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .fixture-selector select,
    .fixture-selector button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .fixture-selector button {
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
    }

    .fixture-selector button:hover {
      opacity: 0.9;
    }

    .fixture-selector button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0d1117;
      color: var(--text);
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.8rem;
      resize: vertical;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      /* allow tooltips to overflow out of the grid */
      overflow: visible;
    }

    .stat-card {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      /* allow the ? tooltip popup to escape the card boundary */
      overflow: visible;
      position: relative;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      /* removed uppercase — use sentence case per design */
      letter-spacing: 0.3px;
      font-weight: 500;
    }

    .stat-card .value {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 4px;
      /* prevent long strategy strings from overflowing */
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }

    /* Scale down very long values automatically */
    .stat-card .value.small-text {
      font-size: 0.9rem;
    }

    .stat-card .value.green {
      color: var(--green);
    }

    .stat-card .value.orange {
      color: var(--orange);
    }

    .stat-card .value.red {
      color: var(--red);
    }

    .stat-card .value.purple {
      color: var(--purple);
    }

    .stat-card .value.accent {
      color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      /* table headers use sentence case, not uppercase */
    }

    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.8rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-change {
      background: #1f6feb33;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .badge-payment {
      background: #3fb95033;
      color: var(--green);
      border: 1px solid var(--green);
    }

    .badge-type {
      background: #30363d;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .warning-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .warning-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .warning-chip.SEND_ALL {
      background: #d2992233;
      color: var(--orange);
      border: 1px solid var(--orange);
    }

    .warning-chip.HIGH_FEE {
      background: #f8514933;
      color: var(--red);
      border: 1px solid var(--red);
    }

    .warning-chip.RBF_SIGNALING {
      background: #bc8cff33;
      color: var(--purple);
      border: 1px solid var(--purple);
    }

    .warning-chip.DUST_CHANGE {
      background: #f8514933;
      color: var(--red);
      border: 1px solid var(--red);
    }

    .warning-chip.default {
      background: #30363d;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .indicator .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.on {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .dot.off {
      background: var(--border);
    }

    .psbt-display {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      word-break: break-all;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      max-height: 120px;
      overflow-y: auto;
    }

    .error-banner {
      background: #f8514922;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 16px;
      color: var(--red);
    }

    .error-banner strong {
      display: block;
      margin-bottom: 4px;
    }

    .tooltip-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 2px;
    }

    .flow-diagram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .flow-box {
      background: #0d1117;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      text-align: center;
      min-width: 120px;
    }

    .flow-box .fb-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .flow-box .fb-value {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .flow-arrow {
      color: var(--text-muted);
      font-size: 1.5rem;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    /* Interactive ? circle tooltip system — JS-driven, position:fixed to bypass any parent overflow clipping */
    .info-tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3d444d;
      color: #8b949e;
      border: 1px solid #444c56;
      font-size: 0.6rem;
      font-weight: 800;
      cursor: help;
      position: relative;
      vertical-align: middle;
      margin-left: 5px;
      flex-shrink: 0;
      user-select: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .info-tip.active,
    .info-tip:hover {
      background: #f0c030;
      color: #0d1117;
      border-color: #f0c030;
      transform: scale(1.18);
      box-shadow: 0 0 8px rgba(240, 192, 48, 0.55);
    }

    /* Tooltip popup — rendered with position:fixed via inline style from JS */
    .info-tip-popup {
      position: fixed;
      background: #1c2128;
      color: var(--text);
      border: 1px solid #f0c030;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 400;
      font-style: normal;
      line-height: 1.55;
      width: 290px;
      z-index: 99999;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.7);
      pointer-events: none;
      text-align: left;
      white-space: normal;
      animation: tooltipFadeIn 0.15s ease;
    }

    @keyframes tooltipFadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .info-tip-popup::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: #f0c030;
    }

    /* Glossary inline term (dashed underline + hover popup) */
    .glossary-term {
      border-bottom: 1px dashed var(--text-muted);
      cursor: help;
      position: relative;
      display: inline;
    }

    .glossary-term:hover {
      border-bottom-color: var(--orange);
      color: var(--orange);
    }

    .glossary-term:hover .glossary-tip {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .glossary-tip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1c2128;
      color: var(--text);
      border: 1px solid var(--orange);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.8rem;
      font-style: normal;
      line-height: 1.55;
      width: 290px;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
      pointer-events: none;
      white-space: normal;
    }

    .glossary-tip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--orange);
    }

    /* Educational intro section */
    .intro-box {
      background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .intro-box h2 {
      color: var(--accent);
      margin-top: 0;
    }

    .intro-analogy {
      background: #0d1117;
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 14px 18px;
      margin: 14px 0;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.7;
    }

    .intro-analogy strong {
      color: var(--accent);
    }

    .concept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .concept-card {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .concept-card .cc-icon {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .concept-card .cc-title {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .concept-card .cc-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Copy button */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      background: #1c2128;
      color: var(--text);
      border-color: var(--accent);
    }

    .copy-btn.copied {
      color: var(--green);
      border-color: var(--green);
    }

    /* "Why selected" explanation box */
    .why-selected {
      background: #3fb95015;
      border: 1px solid #3fb95044;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .why-selected strong {
      color: var(--green);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Helper functions ─────────────────────────────────────────────────

    function formatSats(sats) {
      if (sats == null) return '—';
      return sats.toLocaleString() + ' sats';
    }

    function truncateHex(hex, len = 8) {
      if (!hex) return '';
      if (hex.length <= len * 2 + 2) return hex;
      return hex.slice(0, len) + '…' + hex.slice(-len);
    }

    function truncateTxid(txid) {
      if (!txid) return '';
      return txid.slice(0, 8) + '…' + txid.slice(-8);
    }

    const WARNING_DESCRIPTIONS = {
      SEND_ALL: "You're sending everything — no change comes back to your wallet. It's like emptying your piggy bank completely. The small leftover becomes the miner's tip.",
      HIGH_FEE: "The fee is unusually high — you're paying a lot for this transfer. Double-check if this is intentional. It's like paying $50 shipping on a $10 item.",
      RBF_SIGNALING: "This transaction can be replaced before it confirms — like being able to recall a letter after mailing it but before delivery. Useful if you need to speed it up later.",
      DUST_CHANGE: "The change is so tiny it's not worth keeping — like getting a fraction of a penny back. It costs more to spend than it's worth, so it's absorbed into the fee.",
      DUST_PAYMENT: "One or more payments are extremely small (below 546 sats) — like trying to mail a letter with not enough postage. The network may reject these.",
      UNKNOWN_NETWORK: "This transaction targets an unrecognized Bitcoin network. Make sure you're on the right network (mainnet for real Bitcoin, testnet for testing).",
      LARGE_INPUT_COUNT: "This transaction uses many coins, making it large and expensive — like paying for lunch with hundreds of tiny coins instead of a few bills.",
    };

    const WARNING_ICONS = {
      SEND_ALL: '📤',
      HIGH_FEE: '🔥',
      RBF_SIGNALING: '🔄',
      DUST_CHANGE: '🧹',
      DUST_PAYMENT: '💸',
      UNKNOWN_NETWORK: '🌐',
      LARGE_INPUT_COUNT: '📦',
    };

    // ── Glossary (plain-English definitions for hover tooltips) ─────────

    const GLOSSARY = {
      UTXO: "Unspent Transaction Output — think of it like a specific bill in your wallet. You can't tear a bill in half; you spend the whole thing and get change back.",
      sats: 'Satoshis — the smallest unit of Bitcoin. 1 Bitcoin = 100,000,000 sats. Like cents to dollars, but much smaller.',
      'sat/vB': 'Satoshis per virtual byte — how much you pay per unit of transaction size. Higher = faster confirmation, like paying more for express shipping.',
      vbytes: "Virtual bytes — the 'weight' of your transaction after SegWit discount. Smaller transactions cost less in fees.",
      PSBT: "Partially Signed Bitcoin Transaction (BIP-174) — a standard format for sharing unsigned transactions. Like a check that's been filled out but not yet signed.",
      RBF: 'Replace-By-Fee (BIP-125) — lets you speed up a stuck transaction by resubmitting it with a higher fee, like upgrading shipping after placing an order.',
      nSequence: 'A per-input field that controls whether RBF and timelocks are active. Different values signal different behaviors to the network.',
      locktime: "A time restriction on when the transaction can be confirmed — like a post-dated check that can't be cashed until a certain date.",
      'script type': 'The format of a Bitcoin address. Newer types (P2TR, P2WPKH) are cheaper to spend — like different envelope formats where some cost less postage.',
      'change output': "When you pay with a bill larger than the price, the leftover goes back to you as 'change' — just like at a store.",
      'dust threshold': "The minimum useful amount (546 sats). Below this, it costs more in fees to spend than it's worth — like a coin too small to be accepted.",
      'fee rate': 'How much you pay per unit of transaction weight. Higher fee rates get your transaction confirmed faster by miners.',
      'miner fee': "The amount paid to Bitcoin miners for including your transaction in a block. It's the difference between inputs and outputs.",
    };

    function Term({ children, term }) {
      const key = term || children;
      const tip = GLOSSARY[key];
      if (!tip) return <span>{children}</span>;
      return (
        <span className="glossary-term">
          {children}
          <span className="glossary-tip">💡 <strong>{key}:</strong> {tip}</span>
        </span>
      );
    }

    // ── Educational Components ────────────────────────────────────────────

    function IntroPanel() {
      return (
        <div className="intro-box">
          <h2>🪙 How Bitcoin Transactions Work</h2>
          <div className="intro-analogy">
            Imagine your Bitcoin wallet as a <strong>piggy bank full of different-sized bills</strong>.
            When you want to pay someone, you pick enough bills to cover the price, hand them over,
            and get <strong>change</strong> back. You also pay a small <strong>processing fee</strong>
            {' '}to the network (miners) who verify your payment. That's exactly what this tool does — it
            picks the right "bills" (called <Term>UTXO</Term>s), creates the payment, calculates change, and packages
            everything into an unsigned transaction (<Term>PSBT</Term>) ready for your signature.
          </div>
          <div className="concept-grid">
            <div className="concept-card">
              <div className="cc-icon">🏦</div>
              <div className="cc-title">Your Wallet (<Term>UTXO</Term>s)</div>
              <div className="cc-desc">Your wallet holds individual "coins" called <Term>UTXO</Term>s — like bills of different sizes ($5, $20, $100). You can't tear a bill in half; you spend it whole and get change back.</div>
            </div>
            <div className="concept-card">
              <div className="cc-icon">🎯</div>
              <div className="cc-title">Coin Selection</div>
              <div className="cc-desc">The tool picks which bills to use, preferring ones that are large (fewer coins needed) and cheap to spend (newer <Term term="script type">address formats</Term> cost less in fees).</div>
            </div>
            <div className="concept-card">
              <div className="cc-icon">💸</div>
              <div className="cc-title">Payments & <Term term="change output">Change</Term></div>
              <div className="cc-desc">Your payment goes to the recipient. Any leftover comes back as "change" to your wallet. If the leftover is too tiny (below the <Term term="dust threshold">dust threshold</Term>), it becomes part of the fee.</div>
            </div>
            <div className="concept-card">
              <div className="cc-icon">⛏️</div>
              <div className="cc-title"><Term term="miner fee">Miner Fee</Term></div>
              <div className="cc-desc">Miners process transactions and earn <Term term="miner fee">fees</Term>. A higher <Term term="fee rate">fee rate</Term> gets your transaction confirmed faster — like paying extra for express delivery.</div>
            </div>
          </div>
        </div>
      );
    }

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = async () => {
        try {
          if (navigator.clipboard) {
            await navigator.clipboard.writeText(text);
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (e) { }
      };
      return (
        <button className={`copy-btn ${copied ? 'copied' : ''}`} onClick={handleCopy}>
          {copied ? '✅ Copied!' : '📋 Copy to Clipboard'}
        </button>
      );
    }

    // ── Components ───────────────────────────────────────────────────────

    // Global tooltip portal — renders one div at the top of <body>
    // Avoids ALL CSS overflow/stacking-context clipping issues
    function TooltipPortal({ text, anchorRect }) {
      if (!text || !anchorRect) return null;
      const POPUP_WIDTH = 290;
      // Center above the ? circle, but clamp to viewport edges
      let left = anchorRect.left + anchorRect.width / 2;
      const top = anchorRect.top - 12; // 12px gap above the circle
      // Clamp so popup doesn't go off screen
      left = Math.max(POPUP_WIDTH / 2 + 8, Math.min(left, window.innerWidth - POPUP_WIDTH / 2 - 8));
      return ReactDOM.createPortal(
        <span className="info-tip-popup" style={{
          top: `${top}px`,
          left: `${left}px`,
          transform: 'translate(-50%, -100%)',
        }}>
          {text}
        </span>,
        document.body
      );
    }

    function InfoTip({ text }) {
      const [active, setActive] = React.useState(false);
      const [rect, setRect] = React.useState(null);
      const ref = React.useRef(null);
      if (!text) return null;
      const show = () => {
        if (ref.current) setRect(ref.current.getBoundingClientRect());
        setActive(true);
      };
      const hide = () => setActive(false);
      return (
        <>
          <span
            ref={ref}
            className={`info-tip${active ? ' active' : ''}`}
            onMouseEnter={show}
            onMouseLeave={hide}
            onFocus={show}
            onBlur={hide}
          >?</span>
          {active && <TooltipPortal text={text} anchorRect={rect} />}
        </>
      );
    }

    function StatCard({ label, value, color, tooltip }) {
      const strVal = String(value);
      const isLong = strVal.length > 12;
      const displayVal = typeof value === 'string' ? value.replace(/_/g, ' ') : value;
      return (
        <div className="stat-card">
          <div className="label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '2px' }}>
            {label}
            <InfoTip text={tooltip} />
          </div>
          <div className={`value ${color || ''} ${isLong ? 'small-text' : ''}`}>{displayVal}</div>
        </div>
      );
    }

    function TransactionFlow({ report }) {
      const inputSum = report.selected_inputs.reduce((s, i) => s + i.value_sats, 0);
      const outputSum = report.outputs.reduce((s, o) => s + o.value_sats, 0);
      const paymentSum = report.outputs.filter(o => !o.is_change).reduce((s, o) => s + o.value_sats, 0);
      const changeSum = report.outputs.filter(o => o.is_change).reduce((s, o) => s + o.value_sats, 0);
      return (
        <div>
          <div className="flow-diagram">
            <div className="flow-box" style={{ borderColor: 'var(--accent)' }}>
              <div className="fb-label">Inputs <InfoTip text={`${report.selected_inputs.length} UTXO(s) selected from your wallet to fund this transaction.`} /></div>
              <div className="fb-value" style={{ color: 'var(--accent)' }}>{formatSats(inputSum)}</div>
            </div>
            <div className="flow-arrow">→</div>
            <div className="flow-box" style={{ borderColor: 'var(--green)' }}>
              <div className="fb-label">Payments <InfoTip text={`${report.outputs.filter(o => !o.is_change).length} payment output(s) going to recipient(s).`} /></div>
              <div className="fb-value" style={{ color: 'var(--green)' }}>{formatSats(paymentSum)}</div>
            </div>
            {changeSum > 0 && (
              <>
                <div className="flow-arrow">+</div>
                <div className="flow-box" style={{ borderColor: 'var(--accent)' }}>
                  <div className="fb-label">Change <InfoTip text="The leftover amount returned to your wallet — like getting change from a cashier." /></div>
                  <div className="fb-value" style={{ color: 'var(--accent)' }}>{formatSats(changeSum)}</div>
                </div>
              </>
            )}
            <div className="flow-arrow">+</div>
            <div className="flow-box" style={{ borderColor: 'var(--orange)' }}>
              <div className="fb-label">Fee <InfoTip text={`${report.fee_rate_sat_vb.toFixed(2)} sat/vB × ${report.vbytes} vB. The difference between total inputs and total outputs. Miners collect this as incentive to include the transaction.`} /></div>
              <div className="fb-value" style={{ color: 'var(--orange)' }}>{formatSats(report.fee_sats)}</div>
            </div>
          </div>
          <div style={{ textAlign: 'center', marginTop: '8px', fontFamily: 'SF Mono, Monaco, monospace', fontSize: '0.85rem', color: 'var(--text-muted)' }}>
            <strong style={{ color: 'var(--text)' }}>Balance equation:</strong>{' '}
            <span style={{ color: 'var(--accent)' }}>{inputSum.toLocaleString()}</span>
            {' = '}
            <span style={{ color: 'var(--green)' }}>{paymentSum.toLocaleString()}</span>
            {changeSum > 0 && <> + <span style={{ color: 'var(--accent)' }}>{changeSum.toLocaleString()}</span></>}
            {' + '}
            <span style={{ color: 'var(--orange)' }}>{report.fee_sats.toLocaleString()}</span>
            {' '}
            {inputSum === outputSum + report.fee_sats ? <span style={{ color: 'var(--green)' }}>✓</span> : <span style={{ color: 'var(--red)' }}>✗</span>}
          </div>
        </div>
      );
    }

    function InputsTable({ inputs }) {
      return (
        <div style={{ overflowX: 'auto' }}>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>TXID <InfoTip text="Transaction ID — a unique hash identifying the previous transaction that created this coin." /></th>
                <th>Value <InfoTip text="How many satoshis this coin is worth. 1 Bitcoin = 100,000,000 sats." /></th>
                <th>Script Type <InfoTip text="The format of the Bitcoin address. Newer types (P2TR, P2WPKH) are cheaper to spend than older ones (P2PKH)." /></th>
              </tr>
            </thead>
            <tbody>
              {inputs.map((inp, i) => (
                <tr key={i}>
                  <td>{i + 1}</td>
                  <td title={inp.txid + ':' + inp.vout}>{truncateTxid(inp.txid)}:{inp.vout}</td>
                  <td>{formatSats(inp.value_sats)}</td>
                  <td><span className="badge badge-type">{inp.script_type}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function OutputsTable({ outputs }) {
      return (
        <div style={{ overflowX: 'auto' }}>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Address <InfoTip text="The Bitcoin address receiving this output. Addresses are derived from scriptPubKey." /></th>
                <th>Value <InfoTip text="Amount in satoshis being sent to this output." /></th>
                <th>Type <InfoTip text="Address format — newer types like P2TR and P2WPKH cost less in fees." /></th>
                <th>Role <InfoTip text="Payment = going to recipient. Change = leftover coming back to your wallet." /></th>
              </tr>
            </thead>
            <tbody>
              {outputs.map((out, i) => (
                <tr key={i}>
                  <td>{out.n}</td>
                  <td title={out.script_pubkey_hex}>
                    {out.address ? truncateHex(out.address, 12) : truncateHex(out.script_pubkey_hex)}
                  </td>
                  <td>{formatSats(out.value_sats)}</td>
                  <td><span className="badge badge-type">{out.script_type}</span></td>
                  <td>
                    {out.is_change
                      ? <span className="badge badge-change">🔄 Change</span>
                      : <span className="badge badge-payment">💸 Payment</span>
                    }
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function WarningsDisplay({ warnings }) {
      if (!warnings || warnings.length === 0) {
        return <div style={{ color: 'var(--green)', fontSize: '0.9rem', padding: '12px', background: '#3fb95015', borderRadius: '8px', border: '1px solid #3fb95033' }}>✅ <strong>All clear!</strong> No safety warnings detected — this transaction looks well-constructed and safe to sign.</div>;
      }
      return (
        <div>
          <div className="warning-list">
            {warnings.map((w, i) => (
              <div key={i} className={`warning-chip ${w.code || 'default'}`} title={WARNING_DESCRIPTIONS[w.code] || ''}>
                <span>{WARNING_ICONS[w.code] || '⚠️'}</span>
                <span>{w.code}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: '12px' }}>
            {warnings.map((w, i) => (
              <div key={i} style={{
                background: '#0d1117',
                border: '1px solid var(--border)',
                borderRadius: '6px',
                padding: '10px 14px',
                marginBottom: '8px',
                fontSize: '0.85rem',
              }}>
                <div style={{ fontWeight: 600, color: 'var(--text)', marginBottom: '2px' }}>
                  {WARNING_ICONS[w.code] || '⚠️'} {w.code}
                </div>
                <div style={{ color: 'var(--text-muted)' }}>
                  {WARNING_DESCRIPTIONS[w.code] || w.message || 'Unknown warning'}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function RbfLocktimePanel({ report }) {
      // Determine nSequence from rbf_signaling and locktime
      let nSequenceHex = '0xFFFFFFFF';
      let nSequenceDesc = 'Final (no RBF, no locktime)';
      if (report.rbf_signaling) {
        nSequenceHex = '0xFFFFFFFD';
        nSequenceDesc = 'RBF signaling enabled (BIP-125)';
      } else if (report.locktime > 0 || report.locktime_type !== 'none') {
        nSequenceHex = '0xFFFFFFFE';
        nSequenceDesc = 'Locktime enabled without RBF';
      }
      return (
        <div className="stat-grid">
          <div className="stat-card">
            <div className="label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '2px' }}>
              <Term>RBF</Term> Signaling
              <InfoTip text={report.rbf_signaling
                ? 'Replace-By-Fee is ON. This transaction can be replaced with a higher fee before confirmation — like recalling a letter and resending with express postage.'
                : 'Replace-By-Fee is OFF. Transaction is final once broadcast — it cannot be replaced with a higher-fee version.'
              } />
            </div>
            <div className="indicator" style={{ justifyContent: 'center', marginTop: '8px' }}>
              <span className={`dot ${report.rbf_signaling ? 'on' : 'off'}`}></span>
              <span style={{ fontWeight: 600, color: report.rbf_signaling ? 'var(--green)' : 'var(--text-muted)' }}>
                {report.rbf_signaling ? 'Enabled' : 'Disabled'}
              </span>
            </div>
          </div>
          <div className="stat-card">
            <div className="label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '2px' }}>
              <Term>nSequence</Term>
              <InfoTip text={nSequenceDesc} />
            </div>
            <div className="value" style={{ fontSize: '1rem', fontFamily: 'SF Mono, Monaco, monospace' }}>
              {nSequenceHex}
            </div>
          </div>
          <div className="stat-card">
            <div className="label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '2px' }}>
              <Term>locktime</Term>
              <InfoTip text={
                report.locktime_type === 'none'
                  ? 'No time restriction — transaction can be mined immediately.'
                  : report.locktime_type === 'block_height'
                    ? `Transaction is locked until block ${report.locktime.toLocaleString()} is mined. Before that, miners will not include it.`
                    : `Transaction is locked until ${new Date(report.locktime * 1000).toUTCString()}. Before that time, miners will not include it.`
              } />
            </div>
            <div className={`value ${report.locktime > 0 ? 'purple' : ''}`}>
              {report.locktime === 0 ? 'None' : report.locktime.toLocaleString()}
            </div>
          </div>
          <div className="stat-card">
            <div className="label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '2px' }}>
              Locktime Type
              <InfoTip text="How the locktime value is interpreted: 'Block Height' means it's a block number, 'Unix Timestamp' means it's a date/time. Values below 500,000,000 are block heights; at or above are timestamps." />
            </div>
            <div className="value" style={{ fontSize: '1rem' }}>
              {report.locktime_type === 'none' && '—'}
              {report.locktime_type === 'block_height' && '🧱 Block Height'}
              {report.locktime_type === 'unix_timestamp' && '🕐 Unix Timestamp'}
            </div>
          </div>
        </div>
      );
    }

    function UTXOPoolTable({ fixtureJson, selectedTxids }) {
      let utxos = [];
      try {
        const parsed = JSON.parse(fixtureJson);
        utxos = parsed.utxos || [];
      } catch { return null; }
      if (utxos.length === 0) return null;
      const selectedKeys = new Set(selectedTxids);
      return (
        <div style={{ overflowX: 'auto', maxHeight: '300px', overflowY: 'auto' }}>
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>TXID : Vout</th>
                <th>Value</th>
                <th>Script Type</th>
              </tr>
            </thead>
            <tbody>
              {utxos.map((u, i) => {
                const key = u.txid + ':' + u.vout;
                const isSelected = selectedKeys.has(key);
                return (
                  <tr key={i} style={{ opacity: isSelected ? 1 : 0.5 }}>
                    <td>{isSelected ? <span style={{ color: 'var(--green)' }}>✓ Selected</span> : <span style={{ color: 'var(--text-muted)' }}>— Skipped</span>}</td>
                    <td title={u.txid + ':' + u.vout}>{truncateTxid(u.txid)}:{u.vout}</td>
                    <td>{formatSats(u.value_sats)}</td>
                    <td><span className="badge badge-type">{u.script_type}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────

    function App() {
      const [fixtures, setFixtures] = useState([]);
      const [selectedFixture, setSelectedFixture] = useState('');
      const [fixtureJson, setFixtureJson] = useState('');
      const [report, setReport] = useState(null);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      // Load fixture list
      useEffect(() => {
        fetch('/api/fixtures')
          .then(r => r.json())
          .then(data => {
            setFixtures(data.fixtures || []);
            if (data.fixtures && data.fixtures.length > 0) {
              setSelectedFixture(data.fixtures[0]);
            }
          })
          .catch(() => { });
      }, []);

      // Load fixture content when selection changes
      useEffect(() => {
        if (!selectedFixture) return;
        fetch(`/api/fixtures/${selectedFixture}`)
          .then(r => r.text())
          .then(text => {
            try {
              const parsed = JSON.parse(text);
              setFixtureJson(JSON.stringify(parsed, null, 2));
            } catch {
              setFixtureJson(text);
            }
          })
          .catch(() => { });
      }, [selectedFixture]);

      const handleBuild = async () => {
        setLoading(true);
        setError(null);
        setReport(null);
        try {
          const parsed = JSON.parse(fixtureJson);
          const res = await fetch('/api/build', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(parsed),
          });
          const data = await res.json();
          if (data.ok) {
            setReport(data);
          } else {
            setError(data.error || { code: 'UNKNOWN', message: 'Build failed' });
          }
        } catch (e) {
          setError({ code: 'PARSE_ERROR', message: e.message || 'Invalid JSON' });
        }
        setLoading(false);
      };

      return (
        <div className="container">
          <h1>⚒️ <span>Coin Smith</span></h1>
          <div className="subtitle">A visual Bitcoin transaction builder that helps you understand how wallets select coins, calculate fees, and create safe transactions</div>

          <IntroPanel />

          {/* Fixture Selection */}
          <div className="panel">
            <h2>📁 Load a Transaction Scenario <InfoTip text='A "fixture" describes a wallet scenario: your available coins, who to pay, the fee rate, and settings like RBF. Pick one from the dropdown or paste your own JSON.' /></h2>
            <div className="fixture-selector">
              <select value={selectedFixture} onChange={e => setSelectedFixture(e.target.value)}>
                {fixtures.map(f => <option key={f} value={f}>{f.replace('.json', '')}</option>)}
              </select>
              <button onClick={handleBuild} disabled={loading || !fixtureJson.trim()}>
                {loading ? '⏳ Building…' : '🔨 Build PSBT'}
              </button>
            </div>
            <textarea
              value={fixtureJson}
              onChange={e => setFixtureJson(e.target.value)}
              placeholder="Paste fixture JSON here or select from dropdown..."
              spellCheck={false}
            />
          </div>

          {/* Error Display */}
          {error && (
            <div className="error-banner">
              <strong>❌ Error: {error.code}</strong>
              {error.message}
            </div>
          )}

          {/* Report Display */}
          {report && (
            <>
              {/* Transaction Flow Diagram */}
              <div className="panel">
                <h2>🔀 Where Does the Money Go? <InfoTip text="This diagram shows the flow of funds — coins go in from your wallet, payments go out to recipients, change comes back to you, and the miner fee is the difference." /></h2>
                <TransactionFlow report={report} />
              </div>

              {/* Summary Stats */}
              <div className="panel">
                <h2>📊 Transaction Summary <InfoTip text="Key numbers at a glance — hover over any ❓ for a plain-English explanation." /></h2>
                <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                  🌐 Network: <strong style={{ color: 'var(--accent)' }}>{report.network}</strong>
                </div>
                <div className="stat-grid">
                  <StatCard label="Coins Used" value={report.selected_inputs.length} color="accent" tooltip="How many 'bills' from your wallet were picked to fund this payment" />
                  <StatCard label="Outputs Created" value={report.outputs.length} color="green" tooltip="Total destinations: payment(s) sent + optional change back to you" />
                  <StatCard label="Miner Fee" value={formatSats(report.fee_sats)} color="orange" tooltip="The 'processing fee' paid to miners — like a shipping cost for your transaction" />
                  <StatCard label="Fee Rate" value={report.fee_rate_sat_vb.toFixed(2) + ' sat/vB'} color="orange" tooltip="Cost per unit of transaction size — higher rate = faster confirmation, like express shipping" />
                  <StatCard label="Tx Weight" value={report.vbytes + ' vB'} color="" tooltip="How 'heavy' the transaction is — more coins used = larger size = higher total fee" />
                  <StatCard label="Strategy" value={report.strategy} color="accent" tooltip="Coin selection algorithm: picks high-value, cheap-to-spend coins first to minimize your fees" />
                </div>
              </div>

              {/* Warnings */}
              <div className="panel">
                <h2>⚠️ Safety Check <InfoTip text="These warnings flag anything unusual about your transaction — like a safety checklist before sending money." /></h2>
                <WarningsDisplay warnings={report.warnings} />
              </div>

              {/* RBF / Locktime */}
              <div className="panel">
                <h2>🔐 Transaction Controls <InfoTip text="These settings control whether you can replace this transaction later (RBF) and when it can be confirmed (locktime) — like adding special instructions to a bank transfer." /></h2>
                <RbfLocktimePanel report={report} />
              </div>

              {/* Inputs & Outputs */}
              <div className="grid">
                <div className="panel">
                  <h2>📥 Coins Being Spent <InfoTip text='These are the "bills" picked from your wallet. Each is a previous payment you received (called a UTXO) now being used to fund this transaction.' /></h2>
                  <InputsTable inputs={report.selected_inputs} />
                </div>
                <div className="panel">
                  <h2>📤 Where It's Going <InfoTip text="💸 Payments go to the recipient. 🔄 Change comes back to your wallet — like getting change from a cashier." /></h2>
                  <OutputsTable outputs={report.outputs} />
                </div>
              </div>

              {/* UTXO Pool Overview */}
              <div className="panel">
                <h2>🏦 Your Wallet's Coins <InfoTip text="Below is every coin (UTXO) in your wallet — like laying out all the bills from your physical wallet. ✓ Green = selected to fund this transaction. Dimmed = skipped." /></h2>
                <div className="why-selected">
                  💡 <strong>Why these coins?</strong> The tool uses an "effective value" strategy — it prefers coins that are
                  {' '}<strong>large</strong> (covers more of the payment with fewer coins) and <strong>cheap to spend</strong> (newer
                  address formats like P2TR and P2WPKH cost less in fees than older formats like P2PKH). This minimizes
                  the total fee you pay.
                </div>
                <UTXOPoolTable
                  fixtureJson={fixtureJson}
                  selectedTxids={new Set(report.selected_inputs.map(i => i.txid + ':' + i.vout))}
                />
              </div>

              {/* PSBT */}
              <div className="panel">
                <h2>📦 <Term>PSBT</Term> (Unsigned Transaction Package) <InfoTip text="This is your Partially Signed Bitcoin Transaction (BIP-174) — think of it as a filled-out check that hasn't been signed yet. It contains all the details (which coins to spend, who to pay, how much change) in a standard format that any compatible wallet can read and sign." /></h2>
                <div style={{ display: 'flex', gap: '8px', marginBottom: '8px' }}>
                  <CopyButton text={report.psbt_base64} />
                </div>
                <div className="psbt-display">{report.psbt_base64}</div>
              </div>
            </>
          )}

          {/* Footer */}
          <div style={{ textAlign: 'center', padding: '20px', color: 'var(--text-muted)', fontSize: '0.8rem' }}>
            Coin Smith — Summer of Bitcoin 2026 Week 2 Challenge
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
